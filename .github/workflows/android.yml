name: Build TA-Lib wheels for Windows and Android

on:
  workflow_dispatch:

env:
  TALIB_C_VER: 0.6.4
  TALIB_PY_VER: 0.6.8
  PIP_NO_VERIFY: 0
  PIP_VERBOSE: 1
  CIBW_BUILD_VERBOSITY: 2
  CIBW_TEST_REQUIRES: pytest pandas polars
  CIBW_TEST_COMMAND: >
    cd .. &&
    pytest --rootdir=C: -k "not RSI and not threading" {project}/tests
  CIBW_TEST_SKIP: "*win32 *arm64 cp38* cp39* cp314t*"
  MSBUILDTREATHIGHERTOOLSVERSIONASCURRENT: 1

jobs:
  build_amd64:
    name: Build AMD64 wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - run: build.cmd
        shell: cmd
      - uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ENVIRONMENT_WINDOWS: >
            TA_LIBRARY_PATH="ta-lib-$TALIB_C_VER\_build;$LIB"
            TA_INCLUDE_PATH="ta-lib-$TALIB_C_VER\include;$INCLUDE"
            PIP_NO_BUILD_ISOLATION=false
      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: wheels-win-amd64
  build_x86:
    name: Build x86 wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86
      - run: build.cmd
        shell: cmd
      - uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS_WINDOWS: x86
          CIBW_ENVIRONMENT_WINDOWS: >
            TA_LIBRARY_PATH="ta-lib-$TALIB_C_VER\_build;$LIB"
            TA_INCLUDE_PATH="ta-lib-$TALIB_C_VER\include;$INCLUDE"
            PIP_NO_BUILD_ISOLATION=false
      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: wheels-win32
  build_android:
    name: Build Android wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel==3.2.1
      - name: Install Android NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk android-sdk-platform-tools android-sdk-build-tools
          sudo apt-get install -y android-ndk
      - name: Build TA-Lib C library for Android
        run: |
          wget -qO- http://prdownloads.sourceforge.net/ta-lib/ta-lib-${{ env.TALIB_C_VER }}-src.tar.gz | tar xvz
          cd ta-lib-${{ env.TALIB_C_VER }}
          export ANDROID_NDK_HOME=$(which ndk-build | sed 's//ndk-build$//')
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21
          export AR=$TOOLCHAIN/bin/llvm-ar
          export CC=$TOOLCHAIN/bin/$TARGET$API-clang
          export AS=$CC
          export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
          export LD=$TOOLCHAIN/bin/ld
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          ./configure --host=$TARGET --prefix=$(pwd)/_build --enable-static --disable-shared
          make -j4
          make install
      - uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_BUILD: cp310-manylinux_aarch64
          CIBW_ARCHS_LINUX: aarch64
          CIBW_ENVIRONMENT_LINUX: >
            TA_LIBRARY_PATH="ta-lib-${{ env.TALIB_C_VER }}\/_build/lib"
            TA_INCLUDE_PATH="ta-lib-${{ env.TALIB_C_VER }}\/_build/include"
            PIP_NO_BUILD_ISOLATION=false
            ANDROID_NDK_HOME=$(which ndk-build | sed 's/\/ndk-build$//')
            TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
            TARGET=aarch64-linux-android
            API=21
            AR=$TOOLCHAIN/bin/llvm-ar
            CC=$TOOLCHAIN/bin/$TARGET$API-clang
            AS=$CC
            CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
            LD=$TOOLCHAIN/bin/ld
            RANLIB=$TOOLCHAIN/bin/llvm-ranlib
            STRIP=$TOOLCHAIN/bin/llvm-strip
      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: wheels-android-aarch64
